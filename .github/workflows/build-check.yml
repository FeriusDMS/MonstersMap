name: Build and Test

on:
  push:
    branches:
      - DEV
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PUBLIC_NAME: MonstersMap
  SOLUTION_NAME: MonstersMap
  INTERNAL_NAME: MonstersMap
  RELEASE_DIR: MonstersMap\bin\Release\win-x64\MonstersMap
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Download Dalamud
        shell: pwsh
        run: |
          $url = 'https://goatcorp.github.io/dalamud-distrib/latest.zip'
          Invoke-WebRequest -Uri $url -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"

      - name: Restore
        working-directory: MonstersMap
        shell: pwsh
        run: |
          dotnet restore -r win-x64 ${{ env.SOLUTION_NAME }}.csproj
          dotnet restore ..\MonstersMapTests\MonstersMap.Tests.csproj

      - name: Test
        working-directory: MonstersMapTests
        shell: pwsh
        run: |
          dotnet test --configuration Release --no-restore
